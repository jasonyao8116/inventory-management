    function generateStatement() {
      const customerId = document.getElementById('stmt_customer').value;
      const startDate = document.getElementById('stmt_start').value;
      const endDate = document.getElementById('stmt_end').value;
      if (!customerId) { showToast('请选择客户'); return; }
      const customer = appData.customers.find(c => c.id === customerId);
      const sales = appData.sales.filter(s => s.customerId === customerId && s.date >= startDate && s.date <= endDate);
      const payments = appData.payments.filter(p => p.customerId === customerId && p.date >= startDate && p.date <= endDate);
      // 期初欠款
      let beginOwed = 0;
      appData.sales.filter(s => s.customerId === customerId && s.date < startDate).forEach(s => {
        beginOwed += calcSaleTotal(s);
        beginOwed -= appData.payments.filter(p => p.saleId === s.id).reduce((sum, p) => sum + p.amount, 0);
      });
      const totalSale = sales.reduce((sum, s) => sum + calcSaleTotal(s), 0);
      const totalPaid = payments.reduce((sum, p) => sum + p.amount, 0);
      const endOwed = beginOwed + totalSale - totalPaid;
      const methodNames = { cash:'现金', transfer:'转账', wechat:'微信', alipay:'支付宝' };
      document.getElementById('statementResult').innerHTML = `
        <div class="report-card print-area">
          <h2 style="text-align:center;margin-bottom:16px">📋 客户对账单</h2>
          <div class="detail-row"><span class="detail-label">客户名称</span><span class="detail-value">${customer?.name||''}</span></div>
          ${customer?.address ? `<div class="detail-row"><span class="detail-label">地址</span><span class="detail-value">${customer.address}</span></div>` : ''}
          <div class="detail-row"><span class="detail-label">对账期间</span><span class="detail-value">${startDate} 至 ${endDate}</span></div>
          <div class="detail-row"><span class="detail-label">期初欠款</span><span class="detail-value">${formatMoney(beginOwed)}</span></div>
          <h4 style="margin:16px 0">本期销售明细</h4>
          ${sales.length ? `<table class="table"><thead><tr><th>单号</th><th>日期</th><th>金额</th></tr></thead>
            <tbody>${sales.map(s => `<tr><td>${s.id}</td><td>${formatDate(s.date)}</td><td>${formatMoney(calcSaleTotal(s))}</td></tr>`).join('')}
            </tbody></table><div style="text-align:right;margin-top:8px;font-weight:600">合计: ${formatMoney(totalSale)}</div>` : '<p>无销售记录</p>'}
          <h4 style="margin:16px 0">本期回款明细</h4>
          ${payments.length ? `<table class="table"><thead><tr><th>日期</th><th>方式</th><th>金额</th></tr></thead>
            <tbody>${payments.map(p => `<tr><td>${formatDate(p.date)}</td><td>${methodNames[p.method]||p.method}</td><td>${formatMoney(p.amount)}</td></tr>`).join('')}
            </tbody></table><div style="text-align:right;margin-top:8px;font-weight:600">合计: ${formatMoney(totalPaid)}</div>` : '<p>无回款记录</p>'}
          <div class="detail-row" style="margin-top:16px;border-top:2px solid var(--primary);padding-top:16px">
            <span class="detail-label">期末欠款</span>
            <span class="detail-value" style="font-size:20px;color:${endOwed>0?'var(--danger)':'var(--success)'}">${formatMoney(endOwed)}</span>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:16px" class="no-print">
          <button class="btn btn-outline" onclick="printContent()">🖨️ 打印</button>
          <button class="btn btn-primary" onclick="exportStatement()">📥 导出</button>
        </div>`;
    }

    function exportData() {
      const wb = XLSX.utils.book_new();
      const sheets = {
        '商品': appData.products,
        '客户': appData.customers.map(c => ({...c, contacts: JSON.stringify(c.contacts), prices: JSON.stringify(c.prices)})),
        '供应商': appData.suppliers,
        '采购单': appData.purchases,
        '销售单': appData.sales,
        '回款': appData.payments,
        '库存': Object.entries(appData.inventory).map(([k,v]) => ({商品ID:k,库存:v}))
      };
      Object.entries(sheets).forEach(([name, data]) => {
        const ws = XLSX.utils.json_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, name);
      });
      XLSX.writeFile(wb, '进销存数据_' + new Date().toISOString().slice(0,10) + '.xlsx');
      showToast('导出成功');
    }

    function importData(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (confirm('确定要导入数据吗？这将覆盖现有数据！')) {
            appData = { ...DEFAULT_DATA, ...data };
            saveData();
            showToast('导入成功');
            renderPage();
          }
        } catch(err) {
          showToast('导入失败：文件格式错误');
        }
      };
      reader.readAsText(file);
    }

      appData.products.forEach(p => { if (!appData.inventory[p.id]) appData.inventory[p.id] = 0; });
